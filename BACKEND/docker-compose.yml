services:

  app:
    build: .
    container_name: healthify_backend

    working_dir: /var/www

    volumes:
      - ./:/var/www

    ports:
      - "8000:8000"

    depends_on:
      - mysql

    command: php artisan serve --host=0.0.0.0 --port=8000

  mysql:
    image: mysql:8.0
    container_name: healthify_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pbl_backend_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: